{% extends 'base.html' %}
{% block title %}Регистрация — HandMade Shop{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="mb-4 text-center">
                        <i class="bi bi-person-plus me-2" style="color:#8b5e83"></i>Регистрация
                    </h3>
                    {% if error %}
                    <div class="alert alert-danger py-2">{{ error }}</div>
                    {% endif %}
                    <form method="post">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-6">
                                <label class="form-label">Имя</label>
                                <input type="text" name="first_name" class="form-control"
                                       value="{{ request.POST.first_name }}">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Фамилия</label>
                                <input type="text" name="last_name" class="form-control"
                                       value="{{ request.POST.last_name }}">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Имя пользователя <span class="text-danger">*</span></label>
                                <input type="text" name="username" class="form-control" required
                                       value="{{ request.POST.username }}">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control"
                                       value="{{ request.POST.email }}">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Пароль <span class="text-danger">*</span></label>
                                <input type="password" name="password" class="form-control" required minlength="6">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Повторите пароль <span class="text-danger">*</span></label>
                                <input type="password" name="password2" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-apply w-100">Создать аккаунт</button>
                            </div>
                        </div>
                    </form>
                    <hr>
                    <p class="text-center mb-0 small">
                        Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
