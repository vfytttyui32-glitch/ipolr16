{% extends 'base.html' %}
{% block title %}Вход — HandMade Shop{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="mb-4 text-center">
                        <i class="bi bi-box-arrow-in-right me-2" style="color:#8b5e83"></i>Вход
                    </h3>
                    {% if error %}
                    <div class="alert alert-danger py-2">{{ error }}</div>
                    {% endif %}
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Имя пользователя</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Пароль</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-apply w-100">Войти</button>
                    </form>
                    <hr>
                    <p class="text-center mb-0 small">
                        Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
